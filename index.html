const USERS = [
  { id: "eeps",  name: "Eeps",                  key: "eeps-zoomies-4f2k",   emoji: "🐈",    accent: "#34e8e0", blurb: "Runs on espresso and undefined behavior." },
  { id: "zarch", name: "Zarch",                 key: "zarch-vroom-9x7q",    emoji: "🏎️",    accent: "#ff3df0", blurb: "More side projects than parking tickets." },
  { id: "moog",  name: "Professor Moogenborks", key: "moog-quantum-2v8z",   emoji: "🐈‍⬛",  accent: "#ffc24d", blurb: "Tenured in chaos. Studies the cosmos one nap at a time." },
  { id: "nat",   name: "Nat",                   key: "nat-nebula-6k3p",     emoji: "🛰️",    accent: "#7cffb2", blurb: "Lives three timezones ahead of the rest of us." },
  { id: "coral", name: "Coral",                 key: "coral-reef-1m9t",     emoji: "🚗",    accent: "#8ab4ff", blurb: "Will reschedule, but make it aesthetic." },

/* ---- date horizon: current month → 5 years out (rolling) ---- */
const HORIZON_YEARS = 5;
const MONTH_NAMES = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
function buildMonths() {
  const list = []; const d0 = new Date();
  for (let i = 0; i < HORIZON_YEARS * 12; i++) {
    const dt = new Date(d0.getFullYear(), d0.getMonth() + i, 1);
    list.push({ y: dt.getFullYear(), m: dt.getMonth(), label: MONTH_NAMES[dt.getMonth()] });
  }
  return list;
}
const MONTHS = buildMonths();

const C = {
  bg: "#070711", panel: "rgba(20,18,38,0.66)", panel2: "rgba(30,27,56,0.55)",
  border: "rgba(140,130,255,0.16)", borderBright: "rgba(160,150,255,0.36)",
  text: "#ece9ff", dim: "#9a96c4", faint: "#67638f",
  free: "#56e39f", busy: "#ff5470", idk: "#ffc24d", cyan: "#34e8e0", magenta: "#ff3df0",
};
const STATUS = {
  free: { key: "free", label: "FREE", sub: "let's gooo",        color: C.free, emoji: "🐱" },
  busy: { key: "busy", label: "BUSY", sub: "do not perceive me", color: C.busy, emoji: "🙀" },
  idk:  { key: "idk",  label: "IDK",  sub: "consult the cosmos", color: C.idk,  emoji: "🌀" },
};
const STATUS_CYCLE = ["free", "busy", "idk", null];

const JOKES = [
  "Schrödinger's calendar: simultaneously free and busy until observed.",
  "I'd tell you a UDP joke but you might not get it.",
  "Parallel parking is just collision detection IRL.",
  "The cat said it'd RSVP right after a quick 14-hour nap.",
  "We don't have plans, we have a distributed system with eventual consistency.",
  "My car and I both refuse to start before coffee.",
  "Friendship is the only protocol with zero packet loss.",
  "Black holes invented 'do not perceive me' energy.",
  "Ship your availability to prod — we'll roll back if it breaks.",
  "404: free time not found. Try clearing your weekend cache.",
  "Two cats walk into a garage. Now it's a startup.",

/* --------------------------- supabase layer --------------------------- */
const DB = (() => {
  try {
    if (!SUPABASE_URL || SUPABASE_URL.indexOf("PASTE") === 0) return null;
    if (!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.indexOf("PASTE") === 0) return null;
    return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch (e) { return null; }
})();
const DB_READY = !!DB;

async function loadAllState() {
  if (!DB) return {};
  const { data, error } = await DB.from("nfp_state").select("*");
  if (error || !data) return {};
  const obj = {};
  data.forEach((r) => { obj[r.uid] = { days: r.days || {}, vibe: r.vibe || "", updatedAt: Number(r.updated_at) || 0 }; });
  return obj;
}
async function saveState(uid, days, vibe) {
  if (!DB) return false;
  const { error } = await DB.from("nfp_state").upsert({ uid, days, vibe, updated_at: Date.now() });
  return !error;
}
async function loadMessages() {
  if (!DB) return [];
  const { data, error } = await DB.from("nfp_messages").select("*").order("ts", { ascending: true }).limit(300);
  if (error || !data) return [];
  return data.map((r) => ({ id: r.id, uid: r.uid, ts: Number(r.ts), text: r.body }));
}
async function sendMessage(msg) {
  if (!DB) return false;
  const { error } = await DB.from("nfp_messages").insert({ id: msg.id, uid: msg.uid, ts: msg.ts, body: msg.text });
  return !error;
}
function loadMe() { try { return localStorage.getItem("nfp-me"); } catch (e) { return null; } }
function saveMe(uid) { try { localStorage.setItem("nfp-me", uid); } catch (e) {} }
function clearMe() { try { localStorage.removeItem("nfp-me"); } catch (e) {} }

/* ------------------------------- helpers -------------------------------- */
const pad = (n) => String(n).padStart(2, "0");
const dstr = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;
const now0 = new Date();
const TODAY = dstr(now0.getFullYear(), now0.getMonth(), now0.getDate());
const WEEKDAYS = ["S", "M", "T", "W", "T", "F", "S"];
const WD_LONG = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
function allHorizonDays() {
  const out = [];
  for (const mo of MONTHS) {
    const n = new Date(mo.y, mo.m + 1, 0).getDate();
    for (let d = 1; d <= n; d++) out.push({ y: mo.y, m: mo.m, d, ds: dstr(mo.y, mo.m, d) });
  }
  return out;
}
const ALL_DAYS = allHorizonDays();
const dayDiff = (ds) => Math.round((new Date(ds + "T00:00:00") - new Date(TODAY + "T00:00:00")) / 86400000);
function relTime(ms) {
  if (!ms) return "never";
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 45) return "just now";
  if (s < 3600) return Math.floor(s / 60) + "m ago";
  if (s < 86400) return Math.floor(s / 3600) + "h ago";
  return Math.floor(s / 86400) + "d ago";
}
const hexA = (hex, a) => {
  const h = hex.replace("#", "");
  return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${a})`;
};
function unionById(a, b) {
  const seen = new Map();
  for (const m of a) if (m && m.id) seen.set(m.id, m);
  for (const m of b) if (m && m.id) seen.set(m.id, m);
  return Array.from(seen.values()).sort((x, y) => x.ts - y.ts);
}

const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');
@keyframes nfpFadeUp { from { opacity:0; transform: translateY(10px);} to { opacity:1; transform:none;} }
@keyframes nfpPulse { 0%,100% { opacity:.35; transform:scale(1);} 50% { opacity:.6; transform:scale(1.08);} }
@keyframes nfpDrift { from { background-position: 0 0, 0 0, 0 0;} to { background-position: 600px 900px, -500px 400px, 300px -700px;} }
@keyframes nfpBlink { 0%,100% { opacity:1;} 50% { opacity:.15;} }
@keyframes nfpMarquee { from { transform: translateX(0);} to { transform: translateX(-50%);} }
@keyframes nfpSpin { to { transform: rotate(360deg);} }
@keyframes nfpPop { 0% { transform:scale(.7); opacity:0;} 60% { transform:scale(1.12);} 100% { transform:scale(1); opacity:1;} }
* { box-sizing: border-box; }
body { margin:0; }
.nfp-cell { transition: transform .12s ease, box-shadow .15s ease, background .15s ease, border-color .15s ease; }
.nfp-cell:not(:disabled):hover { transform: translateY(-2px) scale(1.03); }

.nfp-scroll::-webkit-scrollbar-track { background: transparent; }

input, button { font-family: inherit; }
`;

/* ------------------------------- icons --------------------------------- */
function Icon({ name, size = 16, color = "currentColor", style }) {
  const s = { width: size, height: size, display: "block", ...style };
  const stroke = { fill: "none", stroke: color, strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" };
  const V = (children, extra) => <svg viewBox="0 0 24 24" style={s} {...extra}>{children}</svg>;
  switch (name) {
    case "chevron-left": return V(<path d="m15 18-6-6 6-6" {...stroke} />);
    case "chevron-right": return V(<path d="m9 18 6-6-6-6" {...stroke} />);
    case "refresh": return V(<g {...stroke}><path d="M21 12a9 9 0 1 1-2.64-6.36" /><path d="M21 3v5h-5" /></g>);
    case "logout": return V(<g {...stroke}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><path d="m16 17 5-5-5-5" /><path d="M21 12H9" /></g>);
    case "sparkles": return V(<g><path fill={color} d="M12 2l1.8 5.6L19.5 9.4l-5.7 1.8L12 17l-1.8-5.8L4.5 9.4l5.7-1.8z" /><path fill={color} d="M19 14l.6 1.9 1.9.6-1.9.6L19 19l-.6-1.9-1.9-.6 1.9-.6z" /></g>);
    case "calendar": return V(<g {...stroke}><rect x="3" y="4" width="18" height="17" rx="2" /><path d="M3 9h18M8 3v4M16 3v4" /></g>);
    case "users": return V(<g {...stroke}><circle cx="9" cy="8" r="3.5" /><path d="M3.5 20v-1a5.5 5.5 0 0 1 11 0v1" /><path d="M16 4.6a3.5 3.5 0 0 1 0 6.8" /><path d="M20.5 20v-1a5.5 5.5 0 0 0-3-4.9" /></g>);
    case "message": return V(<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" {...stroke} />);
    case "send": return V(<g {...stroke}><path d="M22 2 11 13" /><path d="M22 2 15 22l-4-9-9-4z" /></g>);
    case "radio": return V(<g {...stroke}><circle cx="12" cy="12" r="2" fill={color} stroke="none" /><path d="M16.24 7.76a6 6 0 0 1 0 8.49" /><path d="M7.76 16.24a6 6 0 0 1 0-8.49" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14" /><path d="M4.93 19.07a10 10 0 0 1 0-14.14" /></g>);
    case "key": return V(<g {...stroke}><circle cx="7.5" cy="15.5" r="4.3" /><path d="M10.6 12.4 20 3" /><path d="M16 7l3 3" /><path d="M18.5 4.5l2 2" /></g>);
    case "paw": return V(<g fill={color}><ellipse cx="6" cy="10" rx="1.7" ry="2.3" /><ellipse cx="10" cy="6.6" rx="1.8" ry="2.4" /><ellipse cx="14" cy="6.6" rx="1.8" ry="2.4" /><ellipse cx="18" cy="10" rx="1.7" ry="2.3" /><path d="M12 11.5c3 0 5.5 2.6 5.5 5.3 0 2-1.6 3.2-3.4 3.2-1 0-1.1.5-2.1.5s-1.1-.5-2.1-.5C8.1 20 6.5 18.8 6.5 16.8c0-2.7 2.5-5.3 5.5-5.3z" /></g>);
    case "star": return V(<path fill={color} d="M12 2.5l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 18l-5.8 3 1.1-6.5L2.6 9.3l6.5-.9z" />);
    case "moon": return V(<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" {...stroke} />);
    case "gauge": return V(<g {...stroke}><path d="M4 16a8 8 0 1 1 16 0" /><path d="M12 14.5 15.5 11" /></g>);
    case "orbit": return V(<g><circle cx="12" cy="12" r="3" fill={color} /><ellipse cx="12" cy="12" rx="10" ry="4.4" fill="none" stroke={color} strokeWidth="1.6" transform="rotate(-28 12 12)" /><circle cx="20.2" cy="8.4" r="1.6" fill={color} /></g>);
    case "zap": return V(<path fill={color} d="M13 2 4 14h6l-1 8 9-12h-6z" />);
    default: return null;
  }
}

/* ================================ APP ================================== */
function NFP() {
  const [me, setMe] = useState(null);
  const [allData, setAllData] = useState({});
  const [messages, setMessages] = useState([]);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [saveStateV, setSaveStateV] = useState("idle");
  const [tab, setTab] = useState("days");
  const [monthIdx, setMonthIdx] = useState(0);
  const [convRange, setConvRange] = useState("14");
  const [keyInput, setKeyInput] = useState("");
  const [authError, setAuthError] = useState("");
  const [vibeInput, setVibeInput] = useState("");
  const [toast, setToast] = useState("");
  const [chatInput, setChatInput] = useState("");

  const saveTimer = useRef(null);
  const toastTimer = useRef(null);
  const chatScroll = useRef(null);

  useEffect(() => {
    (async () => {
      if (!DB_READY) { setLoading(false); return; }
      const m = loadMe();
      const [state, msgs] = await Promise.all([loadAllState(), loadMessages()]);
      setAllData(state); setMessages(msgs);
      if (m && USERS.some((u) => u.id === m)) { setMe(m); setVibeInput(state[m]?.vibe || ""); }
      setLoading(false);
    })();
  }, []);

  const refreshAll = useCallback(async (silent = false) => {
    if (!DB_READY) return;
    if (!silent) setSyncing(true);
    const [state, msgs] = await Promise.all([loadAllState(), loadMessages()]);
    setAllData((prev) => {
      const next = { ...prev };
      for (const uid of Object.keys(state)) {
        if (uid === me) { const local = prev[me]; if (local && local.updatedAt >= state[uid].updatedAt) continue; }
        next[uid] = state[uid];
      }
      return next;
    });
    setMessages((prev) => unionById(prev, msgs));
    if (!silent) { setSyncing(false); flashToast("🛰️ re-synced with the mothership"); }
  }, [me]);

  useEffect(() => {
    if (!me) return;
    const ms = tab === "chat" ? 6000 : 20000;
    const id = setInterval(() => refreshAll(true), ms);
    return () => clearInterval(id);
  }, [me, tab, refreshAll]);

  function flashToast(msg) {
    setToast(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(""), 2600);
  }

  const queueSave = useCallback((uid, days, vibe) => {
    setSaveStateV("saving");
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      const ok = await saveState(uid, days, vibe);
      setSaveStateV(ok ? "saved" : "error");
      if (ok) setTimeout(() => setSaveStateV("idle"), 1400);
    }, 550);
  }, []);

  const submitKey = () => {
    const k = keyInput.trim().toLowerCase();
    if (!k) return;
    const found = USERS.find((u) => { const uk = u.key.toLowerCase(); return k === uk || k.endsWith(uk) || k.endsWith("key=" + uk); });
    if (!found) { setAuthError("ACCESS DENIED — that key smells faintly of dog 🐶"); return; }
    setMe(found.id); setVibeInput(allData[found.id]?.vibe || ""); saveMe(found.id);
    setAuthError(""); setKeyInput(""); flashToast(`${found.emoji} welcome back, ${found.name}`);
  };
  const logout = () => { clearMe(); setMe(null); setTab("days"); setKeyInput(""); setAuthError(""); };

  const cycleDay = (ds) => {
    if (!me || ds < TODAY) return;
    setAllData((prev) => {
      const mine = prev[me] || { days: {}, vibe: "", updatedAt: 0 };
      const cur = mine.days[ds] || null;
      const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(cur) + 1) % STATUS_CYCLE.length];
      const days = { ...mine.days };
      if (next === null) delete days[ds]; else days[ds] = next;
      const updated = { ...mine, days, updatedAt: Date.now() };
      queueSave(me, days, updated.vibe);
      return { ...prev, [me]: updated };
    });
  };
  const onVibe = (val) => {
    setVibeInput(val);
    if (!me) return;
    setAllData((prev) => {
      const mine = prev[me] || { days: {}, vibe: "", updatedAt: 0 };
      queueSave(me, mine.days, val);
      return { ...prev, [me]: { ...mine, vibe: val, updatedAt: Date.now() } };
    });
  };

  const sendChat = async () => {
    const text = chatInput.trim();
    if (!text || !me) return;
    const msg = { id: `${me}-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`, uid: me, ts: Date.now(), text: text.slice(0, 280) };
    setChatInput("");
    setMessages((prev) => unionById(prev, [msg]));
    const ok = await sendMessage(msg);
    if (!ok) flashToast("📡 message lost in a wormhole — try again");
    else setTimeout(() => refreshAll(true), 1000);
  };
  const feed = useMemo(() => [...messages].sort((a, b) => a.ts - b.ts).slice(-200), [messages]);
  useEffect(() => { if (tab === "chat" && chatScroll.current) chatScroll.current.scrollTop = chatScroll.current.scrollHeight; }, [feed.length, tab]);

  const convDays = useMemo(() => {
    let days = ALL_DAYS.filter((x) => x.ds >= TODAY);
    if (convRange === "14") days = days.slice(0, 14);
    else if (convRange === "month") days = days.filter((x) => x.m === now0.getMonth() && x.y === now0.getFullYear());
    else if (convRange === "90") days = days.slice(0, 90);
    return days.map((x) => {
      const dt = new Date(x.y, x.m, x.d);
      let free = 0, busy = 0, idk = 0; const freeUsers = []; const statuses = {};
      for (const u of USERS) {
        const sx = allData[u.id]?.days?.[x.ds] || null; statuses[u.id] = sx;
        if (sx === "free") { free++; freeUsers.push(u); } else if (sx === "busy") busy++; else if (sx === "idk") idk++;
      }
      return { ...x, wd: dt.getDay(), free, busy, idk, freeUsers, statuses };
    });
  }, [allData, convRange]);

  const bestDays = useMemo(() => {
    return ALL_DAYS.filter((x) => x.ds >= TODAY && dayDiff(x.ds) <= 120)
      .map((x) => {
        const dt = new Date(x.y, x.m, x.d);
        let free = 0; const freeUsers = [];
        for (const u of USERS) if (allData[u.id]?.days?.[x.ds] === "free") { free++; freeUsers.push(u); }
        return { ...x, wd: dt.getDay(), free, freeUsers };
      })
      .filter((x) => x.free >= 2)
      .sort((a, b) => b.free - a.free || a.ds.localeCompare(b.ds))
      .slice(0, 6);
  }, [allData]);

  const allFreeDays = useMemo(() => {
    return ALL_DAYS.filter((x) => x.ds >= TODAY && dayDiff(x.ds) <= 365)
      .filter((x) => USERS.every((u) => allData[u.id]?.days?.[x.ds] === "free"))
      .map((x) => ({ ...x, wd: new Date(x.y, x.m, x.d).getDay() }))
      .sort((a, b) => a.ds.localeCompare(b.ds));
  }, [allData]);

  const checkedIn = USERS.filter((u) => { const d = allData[u.id]; return d && (Object.keys(d.days || {}).length > 0 || (d.vibe || "").trim()); }).length;

  return (
    <div className="nfp-scroll" style={{ minHeight: "100vh", width: "100%", position: "relative", background: C.bg, color: C.text, fontFamily: "'Space Mono', ui-monospace, SFMono-Regular, Menlo, monospace", overflowX: "hidden" }}>
      <style>{CSS}</style>
      <Cosmos />
      <div style={{ position: "relative", zIndex: 2, maxWidth: 960, margin: "0 auto", padding: "0 16px 90px" }}>
        {!DB_READY ? (
          <Setup />
        ) : loading ? (
          <Booting />
        ) : !me ? (
          <Login keyInput={keyInput} setKeyInput={setKeyInput} authError={authError} submitKey={submitKey} />
        ) : (
          <>
            <Header me={me} syncing={syncing} saveStateV={saveStateV} onRefresh={() => refreshAll(false)} onLogout={logout} />
            <Tabs tab={tab} setTab={setTab} convBadge={allFreeDays.length} />
            {tab === "days" && <MyDays me={me} allData={allData} monthIdx={monthIdx} setMonthIdx={setMonthIdx} cycleDay={cycleDay} vibeInput={vibeInput} onVibe={onVibe} />}
            {tab === "conv" && <Convergence convDays={convDays} bestDays={bestDays} convRange={convRange} setConvRange={setConvRange} checkedIn={checkedIn} allFreeDays={allFreeDays} goChat={() => setTab("chat")} />}
            {tab === "chat" && <Chat me={me} feed={feed} chatInput={chatInput} setChatInput={setChatInput} sendChat={sendChat} scrollRef={chatScroll} />}
            {tab === "crew" && <Crew me={me} allData={allData} />}
          </>
        )}
      </div>
      {toast && (

alter table nfp_state enable row level security;

function MyDays({ me, allData, monthIdx, setMonthIdx, cycleDay, vibeInput, onVibe }) {

  const numDays = new Date(mo.y, mo.m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= numDays; d++) cells.push(d);
  let free = 0, busy = 0, idk = 0;
  for (let d = 1; d <= numDays; d++) { const sx = mine[dstr(mo.y, mo.m, d)]; if (sx === "free") free++; else if (sx === "busy") busy++; else if (sx === "idk") idk++; }

          <button className="nfp-btn" onClick={() => setMonthIdx(Math.min(MONTHS.length - 1, monthIdx + 1))} disabled={monthIdx === MONTHS.length - 1} style={navBtn(monthIdx === MONTHS.length - 1)}><Icon name="chevron-right" size={18} /></button>

                  <div key={row.ds} style={{ display: "grid", gridTemplateColumns: "92px repeat(5, 1fr) 64px", gap: 5, alignItems: "center", padding: "4px 6px", borderTop: `1px solid ${hexA(C.border, 0.6)}`, background: full ? hexA(C.free, 0.1) : "transparent", borderLeft: full ? `2px solid ${C.free}` : "2px solid transparent", borderRadius: full ? 6 : 0 }}>
                    <div style={{ fontSize: 12, color: full ? C.free : weekend ? C.cyan : C.dim }}>
                      <span style={{ fontWeight: 700 }}>{WD_LONG[row.wd]}</span>{" "}
                      <span style={{ color: full ? hexA(C.free, 0.8) : C.faint }}>{dt.getMonth() + 1}/{row.d}</span>
                    </div>
                    {USERS.map((u) => {
                      const sx = row.statuses[u.id]; const meta = sx ? STATUS[sx] : null;
                      return (
                        <div key={u.id} style={{ display: "flex", justifyContent: "center" }}>
                          <span title={`${u.name}: ${meta ? meta.label : "untracked"}`} style={{ width: 24, height: 24, borderRadius: 7, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, background: meta ? hexA(meta.color, 0.2) : "transparent", border: meta ? `1px solid ${hexA(meta.color, 0.65)}` : `1px dashed ${hexA(C.faint, 0.45)}`, color: meta ? meta.color : C.faint }}>
                            {meta ? (sx === "free" ? "✓" : sx === "busy" ? "✕" : "?") : ""}
                          </span>
                        </div>
                      );
                    })}
                    <div style={{ display: "flex", alignItems: "center", gap: 5, justifyContent: "center" }}>
                      <div style={{ flex: 1, height: 6, borderRadius: 99, background: "rgba(255,255,255,0.06)", overflow: "hidden", maxWidth: 30 }}>
                        <div style={{ width: `${(row.free / 5) * 100}%`, height: "100%", background: row.free === 5 ? C.free : C.cyan, transition: "width .3s" }} />
                      </div>
                      <span style={{ fontSize: 12, color: row.free === 5 ? C.free : C.dim, fontWeight: 700, minWidth: 10 }}>{row.free}</span>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </Panel>
    </>
  );
}

function Empty({ icon, title, sub }) {
  return <div style={{ textAlign: "center", padding: "30px 10px", color: C.dim }}><div style={{ marginBottom: 10, display: "flex", justifyContent: "center" }}>{icon}</div><div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 22, letterSpacing: 1, color: C.text }}>{title}</div><div style={{ fontSize: 12, color: C.faint, marginTop: 4, maxWidth: 360, margin: "4px auto 0" }}>{sub}</div></div>;
}

function FullHouseBanner({ days, goChat }) {
  const soonest = days[0]; const dt = new Date(soonest.y, soonest.m, soonest.d);
  const when = `${WD_LONG[soonest.wd]}, ${dt.toLocaleDateString(undefined, { month: "long", day: "numeric", year: "numeric" })}`;
  const extra = days.length - 1;
  return (
    <div style={{ position: "relative", overflow: "hidden", borderRadius: 16, padding: "18px 20px", marginBottom: 14, background: `linear-gradient(105deg, ${hexA(C.free, 0.22)}, ${hexA(C.cyan, 0.14)})`, border: `1px solid ${C.free}`, boxShadow: `0 0 34px ${hexA(C.free, 0.35)}`, animation: "nfpFadeUp .5s ease both" }}>
      <div style={{ position: "absolute", top: -30, right: -10, width: 160, height: 160, borderRadius: "50%", background: `radial-gradient(circle, ${hexA(C.free, 0.35)}, transparent 70%)`, filter: "blur(10px)", animation: "nfpPulse 3s ease-in-out infinite", pointerEvents: "none" }} />
      <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", position: "relative" }}>
        <span style={{ fontSize: 28 }}>🎉</span>
        <div style={{ flex: 1, minWidth: 200 }}>
          <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 30, letterSpacing: 2, lineHeight: 1, color: C.free }}>FULL HOUSE DETECTED</div>
          <div style={{ fontSize: 13, color: C.text, marginTop: 4 }}>All five cats are free on <b>{when}</b>{extra > 0 && <span style={{ color: hexA(C.text, 0.7) }}> · +{extra} more day{extra > 1 ? "s" : ""} this year</span>}</div>
          <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap" }}>{USERS.map((u) => <span key={u.id} title={u.name} style={{ fontSize: 15, width: 28, height: 28, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", background: hexA(u.accent, 0.18), border: `1px solid ${hexA(u.accent, 0.55)}` }}>{u.emoji}</span>)}</div>
        </div>
        {goChat && <button className="nfp-btn" onClick={goChat} style={{ cursor: "pointer", border: "none", borderRadius: 11, padding: "11px 16px", fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, letterSpacing: 1.5, color: "#04130b", background: C.free, boxShadow: `0 4px 18px ${hexA(C.free, 0.5)}`, whiteSpace: "nowrap" }}>LOCK IT IN →</button>}
      </div>
    </div>
  );
}

function Chat({ me, feed, chatInput, setChatInput, sendChat, scrollRef }) {
  const uOf = (id) => USERS.find((x) => x.id === id) || { name: id, emoji: "❔", accent: C.dim };
  const fmtTime = (ts) => {
    const d = new Date(ts); const sameDay = d.toDateString() === new Date().toDateString();
    const t = d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    return sameDay ? t : `${d.toLocaleDateString(undefined, { month: "short", day: "numeric" })} ${t}`;
  };
  return (
    <Panel style={{ padding: 0, overflow: "hidden", display: "flex", flexDirection: "column", height: "62vh", minHeight: 420 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "14px 16px", borderBottom: `1px solid ${C.border}` }}>
        <Icon name="radio" size={15} color={C.magenta} /><span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 22, letterSpacing: 2 }}>TRANSMISSIONS</span>
        <span style={{ fontSize: 11, color: C.faint, marginLeft: "auto" }}>open channel · {feed.length} msgs</span>
      </div>
      <div ref={scrollRef} className="nfp-scroll" style={{ flex: 1, overflowY: "auto", padding: "14px 14px 6px" }}>
        {feed.length === 0 ? (
          <div style={{ textAlign: "center", padding: "50px 16px", color: C.faint }}>
            <div style={{ display: "flex", justifyContent: "center", marginBottom: 10 }}><Icon name="message" size={30} color={C.faint} /></div>
            <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 22, letterSpacing: 1, color: C.text }}>channel's quiet</div>
            <div style={{ fontSize: 12, marginTop: 4 }}>say something before the heat death of the universe.</div>
          </div>
        ) : feed.map((m, i) => {
          const u = uOf(m.uid); const mine = m.uid === me; const prev = feed[i - 1];
          const grouped = prev && prev.uid === m.uid && m.ts - prev.ts < 240000;
          return (
            <div key={m.id} style={{ display: "flex", flexDirection: mine ? "row-reverse" : "row", gap: 8, marginTop: grouped ? 3 : 12 }}>
              <div style={{ width: 30, flexShrink: 0, textAlign: "center" }}>{!grouped && <span style={{ fontSize: 15, width: 30, height: 30, borderRadius: 9, display: "inline-flex", alignItems: "center", justifyContent: "center", background: hexA(u.accent, 0.15), border: `1px solid ${hexA(u.accent, 0.5)}` }}>{u.emoji}</span>}</div>
              <div style={{ maxWidth: "76%", display: "flex", flexDirection: "column", alignItems: mine ? "flex-end" : "flex-start" }}>
                {!grouped && <div style={{ fontSize: 11, color: u.accent, fontWeight: 700, marginBottom: 3, padding: "0 4px" }}>{mine ? "you" : u.name}<span style={{ color: C.faint, fontWeight: 400, marginLeft: 6 }}>{fmtTime(m.ts)}</span></div>}
                <div style={{ fontSize: 13.5, lineHeight: 1.45, color: C.text, padding: "9px 13px", borderRadius: 13, borderTopLeftRadius: mine ? 13 : grouped ? 13 : 3, borderTopRightRadius: mine ? (grouped ? 13 : 3) : 13, background: mine ? hexA(u.accent, 0.16) : "rgba(255,255,255,0.045)", border: `1px solid ${mine ? hexA(u.accent, 0.4) : C.border}`, wordBreak: "break-word", whiteSpace: "pre-wrap" }}>{m.text}</div>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{ display: "flex", gap: 8, padding: 12, borderTop: `1px solid ${C.border}` }}>
        <input value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); } }} placeholder="transmit to the squad…" maxLength={280}
          style={{ flex: 1, padding: "11px 14px", borderRadius: 11, background: "rgba(0,0,0,0.32)", border: `1px solid ${C.border}`, color: C.text, fontSize: 13.5, outline: "none" }} />
        <button className="nfp-btn" onClick={sendChat} disabled={!chatInput.trim()} title="send" style={{ width: 48, borderRadius: 11, border: "none", cursor: chatInput.trim() ? "pointer" : "default", color: "#070711", background: chatInput.trim() ? `linear-gradient(95deg, ${C.cyan}, ${C.free})` : C.panel2, display: "flex", alignItems: "center", justifyContent: "center", opacity: chatInput.trim() ? 1 : 0.5 }}><Icon name="send" size={17} /></button>
      </div>
    </Panel>
  );
}

function Crew({ me, allData }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(250px, 1fr))", gap: 12 }}>
      {USERS.map((u, i) => {
        const d = allData[u.id] || { days: {}, vibe: "", updatedAt: 0 };
        const free = Object.values(d.days).filter((s) => s === "free").length;
        const busy = Object.values(d.days).filter((s) => s === "busy").length;
        const active = Object.keys(d.days).length > 0 || (d.vibe || "").trim();
        const isMe = u.id === me;
        return (
          <div key={u.id} style={{ background: C.panel, border: `1px solid ${isMe ? hexA(u.accent, 0.5) : C.border}`, borderRadius: 16, padding: 16, backdropFilter: "blur(8px)", boxShadow: isMe ? `0 0 22px ${hexA(u.accent, 0.18)}` : "none", animation: "nfpFadeUp .4s ease both", animationDelay: `${i * 60}ms` }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 26, width: 46, height: 46, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", background: hexA(u.accent, 0.14), border: `1px solid ${hexA(u.accent, 0.45)}` }}>{u.emoji}</span>
                <div>
                  <div style={{ fontWeight: 700, color: u.accent, fontSize: 15, lineHeight: 1.1 }}>{u.name}</div>
                  <div style={{ fontSize: 10, color: active ? C.free : C.faint, letterSpacing: 1, marginTop: 2 }}>{active ? "● ONLINE" : "○ RADIO SILENCE"}</div>
                </div>
              </div>
              {isMe && <span style={{ fontSize: 9, color: u.accent, border: `1px solid ${hexA(u.accent, 0.5)}`, borderRadius: 6, padding: "2px 6px", letterSpacing: 1 }}>YOU</span>}
            </div>
            <p style={{ fontSize: 12, color: C.dim, lineHeight: 1.5, margin: "12px 0 10px", minHeight: 34 }}>{u.blurb}</p>
            {(d.vibe || "").trim() ? (
              <div style={{ fontSize: 12, color: C.text, background: "rgba(0,0,0,0.28)", borderLeft: `2px solid ${u.accent}`, padding: "7px 10px", borderRadius: 6, marginBottom: 12 }}>“{d.vibe}”</div>
            ) : (
              <div style={{ fontSize: 11, color: C.faint, fontStyle: "italic", marginBottom: 12 }}>no vibe broadcasted yet</div>
            )}
            <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
              <span style={{ fontSize: 12, color: C.free }}><b style={{ fontSize: 16 }}>{free}</b> free</span>
              <span style={{ fontSize: 12, color: C.busy }}><b style={{ fontSize: 16 }}>{busy}</b> busy</span>
              <span style={{ fontSize: 11, color: C.faint, marginLeft: "auto" }}>{relTime(d.updatedAt)}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Ticker() {
  const line = JOKES.join("   ✦   ");
  return (
    <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 8, height: 34, background: "rgba(8,7,18,0.9)", borderTop: `1px solid ${C.border}`, display: "flex", alignItems: "center", overflow: "hidden", backdropFilter: "blur(6px)" }}>
      <div style={{ display: "flex", whiteSpace: "nowrap", animation: "nfpMarquee 55s linear infinite" }}>
        <span style={{ fontSize: 12, color: C.dim, paddingRight: 40 }}>{line}   ✦   </span>
        <span style={{ fontSize: 12, color: C.dim, paddingRight: 40 }}>{line}   ✦   </span>
      </div>
    </div>
  );
}

const navBtn = (disabled) => ({ width: 40, height: 40, borderRadius: 11, cursor: disabled ? "default" : "pointer", color: disabled ? C.faint : C.text, background: C.panel2, border: `1px solid ${C.border}`, opacity: disabled ? 0.4 : 1, display: "flex", alignItems: "center", justifyContent: "center" });

ReactDOM.createRoot(document.getElementById("root")).render(<NFP />);
</script>
</body>
</html>
